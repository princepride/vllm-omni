# Stage 0: Thinker (multimodal understanding + thinking text generation)
# Think mode: the AR stage generates thinking text before sending KV to DiT.
# CFG companions use prefill_finished; the primary request decodes thinking text
# and transfers KV when it naturally finishes (EOS / max_tokens).

stage_args:
  - stage_id: 0
    stage_type: llm
    prompt_expand_func: vllm_omni.model_executor.stage_input_processors.bagel.expand_cfg_prompts
    runtime:
      devices: "0"
    engine_args:
      model_stage: thinker
      max_num_seqs: 3
      model_arch: OmniBagelForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.45
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: text
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      tensor_parallel_size: 1
      omni_kv_config:
        need_send_cache: true
        kv_transfer_criteria:
          type: think_model
          cfg_suffixes: ["__cfg_text", "__cfg_img"]
          # token_id is auto-resolved from the model's eos_token_id.
          # Override here if needed, e.g. token_id: 151645 for <|im_end|>.
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 4096
      seed: 52
      detokenize: True
      repetition_penalty: 1.05

  - stage_id: 1
    stage_type: diffusion
    cfg_kv_collect_func: vllm_omni.model_executor.stage_input_processors.bagel.collect_cfg_kv_caches
    runtime:
      devices: "0"
    engine_args:
      model_stage: dit
      max_num_seqs: 1
      gpu_memory_utilization: 0.45
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: image
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      tensor_parallel_size: 1
      omni_kv_config:
        need_recv_cache: true
    engine_input_source: [0]

    final_output: true
    final_output_type: image
    is_comprehension: false
    default_sampling_params:
      seed: 52

# Runtime edges
runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

  connectors:
    shared_memory_connector:
      name: SharedMemoryConnector
      extra:
        shm_threshold_bytes: 65536

  edges:
    - from: 0
      to: 1
      window_size: -1
