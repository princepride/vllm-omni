# SenseNova-U1-8B-MoT deploy: single-stage unified LLM pipeline.
#
# The model is a unified Qwen3-based LLM with MoT (Mixture-of-Tokenizers)
# attention that handles text encoding, denoising, and image generation
# in a single pipeline — no separate Thinker (AR) stage needed.
#
# Usage:
#   vllm serve SenseNova/SenseNova-U1-8B-MoT --omni \
#       --deploy-config vllm_omni/deploy/sensenova_u1.yaml
#
# Or programmatically:
#   Omni(model="...", deploy_config_path="vllm_omni/deploy/sensenova_u1.yaml")

async_chunk: false

stages:
  - stage_id: 0
    max_num_seqs: 1
    enforce_eager: true
    devices: "0"
    default_sampling_params:
      seed: 42
